version: "2"

run:
  timeout: 5m
  tests: true

output:
  print-issued-lines: true
  print-linter-name: true

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/skosovsky/contexty)

linters-settings:
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
  revive:
    rules:
      - name: exported
        severity: warning
      - name: var-naming
        severity: warning
      - name: package-comments
        severity: warning
  gosec:
    severity: medium
    confidence: medium

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gocritic
    - revive
    - gosec
    - testifylint
    - unconvert
    - sloglint
    - copyloopvar

issues:
  exclude-use-default: true
  # Tests: relax gosec (test doubles) and revive (naming/comments on test helpers). errcheck stays enabled.
  exclude-rules:
    - path: '(.+)_test\.go$'
      linters:
        - gosec
        - revive
